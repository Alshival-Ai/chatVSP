services:
  web:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: "${LOCAL_UID:-1000}"
        APP_GID: "${LOCAL_GID:-1000}"
    image: alshival:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
    command: ["uvicorn", "alshival.asgi:application", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/accounts/login/', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  worker:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    image: alshival:latest
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_resource_health_worker", "--interval-seconds", "300", "--users-per-worker", "10", "--max-workers", "16"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  reminder-worker:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    image: alshival:latest
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_reminder_worker", "--interval-seconds", "60"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  support-inbox-worker:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    image: alshival:latest
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_support_inbox_worker", "--interval-seconds", "60"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  calendar-worker:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    image: alshival:latest
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_calendar_sync_worker", "--interval-seconds", "60", "--provider", "all"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  github-wiki-worker:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    image: alshival:latest
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_github_wiki_sync_worker", "--interval-seconds", "3600"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  global-key-worker:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    image: alshival:latest
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_global_api_key_worker", "--interval-seconds", "3600"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  user-key-worker:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    image: alshival:latest
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_user_api_key_worker", "--interval-seconds", "10800"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  mcp:
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    image: alshival:latest
    depends_on:
      web:
        condition: service_healthy
      github-mcp:
        condition: service_started
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
      MCP_API_KEY_HEADER: "x-api-key"
      MCP_GITHUB_UPSTREAM_URL: "http://github-mcp:8082/"
      MCP_ASANA_UPSTREAM_URL: "${MCP_ASANA_UPSTREAM_URL:-https://mcp.asana.com/v2/mcp}"
    command: ["uvicorn", "mcp.app:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN:-}"
    command: ["http"]
    restart: unless-stopped
