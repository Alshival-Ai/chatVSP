services:
  web:
    ports: []

  nginx-https:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    environment:
      CERTBOT_CERT_NAME: ${CERTBOT_CERT_NAME:-${CERTBOT_DOMAIN:-dev.alshival.dev}}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-https.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/certbot/www:/var/www/certbot:ro
      - ./docker/certbot/conf:/etc/letsencrypt:ro
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    restart: unless-stopped
